name: Pure Native Android Kotlin DSL Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. سحب كود المشروع من المستودع
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. تنظيف أي ملفات Wrapper قديمة أو تالفة لمنع مشاكل الفحص الأمني
    - name: Clean Potential Corrupt Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar || true

    # 3. إعداد بيئة الجافا الحديثة والمستقرة (Java 21)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    # 4. تثبيت أداة Gradle 8.13 الرسمية لتتوافق مع ملفات الـ .kts الحديثة
    - name: Setup Official Stable Gradle 8.13
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.13'
        disable-wrapper-validation: true

    # 5. إعادة توليد الـ Wrapper السليم والموثق محلياً داخل السيرفر
    - name: Regenerate Fresh Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.13 --distribution-type bin

    # 6. إعطاء صلاحيات التشغيل لملف البناء وإصلاح ترميز السطور لنظام Linux
    - name: Fix Line Endings and Permissions for Executable
      run: |
        chmod +x gradlew
        sed -i 's/\r$//' gradlew || true

    # 7. التجميع الفعلي المباشر واستخراج ملف الـ APK للتطبيق
    - name: Build Android APK (Debug)
      run: |
        ./gradlew assembleDebug --no-daemon

    # 8. رفع ملف الـ APK النهائي ليكون جاهزاً للتحميل فوراً
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Native-KotlinDSL-App-APK
        path: app/build/outputs/apk/debug/*.apk
